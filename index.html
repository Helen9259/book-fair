<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>같이 서울국제도서전 가실래요?</title>

<!-- 링크 미리보기 (카톡/메신저 공유용) -->
<meta property="og:type" content="website" />
<meta property="og:title" content="같이 서울국제도서전 가실래요? 😉" />
<meta property="og:description" content="2026. 6. 26 (금) · 코엑스 A·B1홀, 서울 삼성동" />
<meta property="og:image" content="./og.png" />
<meta name="theme-color" content="#F2503C" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&display=swap" rel="stylesheet" />

<style>
  :root{
    --paper:#FBF6F0;
    --card:#FFFFFF;
    --ink:#1B1A17;
    --muted:#857E74;
    --coral:#F73B2B;
    --coral-ink:#D2331E;
    --coral-soft:#FDE0D8;
    --line:#E9DFD1;
    --radius:20px;
  }

  *{box-sizing:border-box;}

  html,body{height:100%;}

  body{
    margin:0;
    font-family:"Gowun Dodum", system-ui, -apple-system, sans-serif;
    color:var(--ink);
    background:
      radial-gradient(circle at 16% 10%, #FFE9DD 0, transparent 44%),
      radial-gradient(circle at 86% 88%, #FFE4D3 0, transparent 48%),
      var(--paper);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:40px 20px;
    line-height:1.6;
    overflow-x:hidden;
  }

  .ticket{
    position:relative;
    width:100%;
    max-width:520px;
    background:var(--card);
    border-radius:var(--radius);
    padding:38px 40px 40px;
    text-align:center;
    --ny:50%;
    --nr:15px;
    -webkit-mask:
      radial-gradient(circle var(--nr) at left var(--ny), #0000 98%, #000 100%),
      radial-gradient(circle var(--nr) at right var(--ny), #0000 98%, #000 100%);
    -webkit-mask-composite:source-in;
    mask:
      radial-gradient(circle var(--nr) at left var(--ny), #0000 98%, #000 100%),
      radial-gradient(circle var(--nr) at right var(--ny), #0000 98%, #000 100%);
    mask-composite:intersect;
    filter:drop-shadow(0 20px 30px rgba(80,45,30,.18));
    animation:rise .7s cubic-bezier(.2,.7,.2,1) both;
  }

  @keyframes rise{
    from{opacity:0; transform:translateY(16px) scale(.985);}
    to{opacity:1; transform:none;}
  }

  .invite{
    font-size:clamp(2.5rem, 9vw, 3.1rem);
    line-height:1.12;
    font-weight:400;
    color:var(--coral);
    margin:0 0 8px;
    letter-spacing:.03em;
  }

  .event{
    font-size:1rem;
    color:var(--muted);
    margin:0 0 26px;
    letter-spacing:.04em;
  }

  .ask{
    font-size:clamp(.98rem, 4.4vw, 1.5rem);
    line-height:1.4;
    margin:6px 0 26px;
    white-space:nowrap;
  }
  .ask .accent{color:var(--coral);}
  .ask .wink{margin-left:3px;}

  .info{
    list-style:none;
    margin:0 0 4px;
    padding:0;
  }
  .info li{
    font-size:1.04rem;
    line-height:1.5;
    margin:11px 0;
    color:var(--ink);
  }
  .info .emoji{
    margin-right:8px;
  }
  .info a{
    color:var(--ink);
    text-decoration:none;
    border-bottom:1px solid var(--line);
    padding-bottom:1px;
    transition:color .18s, border-color .18s;
  }
  .info a:hover{color:var(--coral-ink); border-color:var(--coral);}
  .info a .go{color:var(--coral); margin-left:2px;}

  .perf{
    position:relative;
    height:1px;
    margin:4px -40px 26px;
    border-top:2px dashed var(--line);
  }

  .buttons{display:flex; gap:12px; align-items:center; justify-content:center;}

  button{
    font-family:inherit;
    font-size:1.05rem;
    cursor:pointer;
    border-radius:12px;
    padding:14px 26px;
    border:1px solid transparent;
    transition:transform .12s, box-shadow .18s, background .18s;
  }
  button:active{transform:translateY(1px);}
  .yes{
    background:var(--coral);
    color:#fff;
    box-shadow:0 12px 24px -12px rgba(242,80,60,.7);
  }
  .yes:hover{background:#E8442F;}
  .no{
    background:#fff;
    color:var(--muted);
    border-color:var(--line);
  }
  .no:hover{background:#fff;}
  .no.loose{position:fixed; z-index:50; margin:0;}

  :focus-visible{outline:2.5px solid var(--coral); outline-offset:3px;}

  .namebox{display:none; margin-top:22px;}
  .namebox.show{display:block; animation:pop .4s cubic-bezier(.2,.8,.2,1) both;}
  .namebox label{
    display:block;
    font-size:1.04rem;
    color:var(--ink);
    margin:0 0 14px;
  }
  .namebox .row{
    display:flex;
    gap:10px;
    align-items:center;
    justify-content:center;
  }
  .namebox input{
    font-family:inherit;
    font-size:1rem;
    color:var(--ink);
    background:#fff;
    border:1px solid var(--line);
    border-radius:12px;
    padding:13px 16px;
    width:60%;
    max-width:240px;
    text-align:center;
    transition:border-color .18s;
  }
  .namebox input::placeholder{color:#C3B9AB;}
  .namebox input:focus{outline:none; border-color:var(--coral);}
  .namebox .add{
    background:var(--coral);
    color:#fff;
    padding:13px 22px;
    box-shadow:0 12px 24px -12px rgba(242,80,60,.7);
  }
  .namebox .add:hover{background:#E8442F;}

  .result{
    display:none;
    margin-top:22px;
    padding:20px 22px;
    background:var(--coral-soft);
    border:1px solid #F6CDC3;
    border-radius:14px;
    animation:pop .45s cubic-bezier(.2,.8,.2,1) both;
  }
  .result.show{display:block;}
  .result strong{color:var(--coral-ink); font-size:1.12rem;}
  .result p{margin:6px 0 0; color:#9a5448; font-size:.95rem;}
  @keyframes pop{from{opacity:0; transform:scale(.94);} to{opacity:1; transform:none;}}

  .guests{display:none; margin-top:22px;}
  .guests.show{display:block;}
  .guests h2{
    font-size:1.05rem;
    font-weight:400;
    color:var(--coral-ink);
    letter-spacing:.02em;
    margin:0 0 14px;
  }
  .guests h2 .count{color:var(--muted); font-size:.92rem;}
  .guests .empty{color:var(--muted); font-size:.95rem; margin:0;}
  .chips{
    list-style:none;
    margin:0;
    padding:0;
    display:flex;
    flex-wrap:wrap;
    gap:9px;
    justify-content:center;
  }
  .chips li{
    background:var(--coral-soft);
    color:var(--coral-ink);
    border:1px solid #F6CDC3;
    border-radius:999px;
    padding:8px 14px;
    font-size:.98rem;
    line-height:1;
    display:inline-flex;
    align-items:center;
    gap:8px;
    animation:pop .35s cubic-bezier(.2,.8,.2,1) both;
  }
  .chips li .del{
    background:none;
    border:none;
    padding:0;
    margin:0;
    border-radius:0;
    color:var(--coral-ink);
    opacity:.45;
    font-size:1.1rem;
    line-height:1;
    cursor:pointer;
    transition:opacity .15s;
  }
  .chips li .del:hover{opacity:1;}

  .confetti{
    position:fixed;
    top:0;left:0;
    pointer-events:none;
    font-size:22px;
    will-change:transform,opacity;
    z-index:60;
  }

  @media (max-width:480px){
    .ticket{padding:30px 22px 32px;}
    .perf{margin-left:-22px; margin-right:-22px;}
  }

  @media (prefers-reduced-motion:reduce){
    *{animation-duration:.01ms !important; transition-duration:.05ms !important;}
  }
</style>
</head>
<body>
  <main class="ticket" role="main">
    <h1 class="invite">초대장</h1>
    <p
